<svg width="100%" viewBox="0 0 900 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Property Management — Current Architecture (Transitional)</title>
  <desc>API Gateway routes traffic to Auth Service, User Service, and Laravel Backend. User Service owns PostgreSQL. Auth Service calls User Service via HTTP. RabbitMQ syncs user.created events back to MySQL in Laravel.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(115,114,108)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- React App -->
  <rect x="370" y="14" width="160" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="450" y="36" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">React App</text>
  <text x="450" y="54" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Vite · port 5173</text>

  <!-- Arrow: React → Gateway -->
  <line x1="450" y1="66" x2="450" y2="110" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="456" y="91" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">all traffic · port 80</text>

  <!-- Docker Compose boundary -->
  <rect x="18" y="100" width="864" height="504" rx="16" fill="none" stroke="rgba(31,30,29,0.15)" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="34" y="95" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Docker Compose network</text>

  <!-- API Gateway -->
  <rect x="180" y="112" width="540" height="90" rx="10" fill="rgb(235,233,255)" stroke="rgb(79,70,229)" stroke-width="1.2"/>
  <text x="450" y="134" text-anchor="middle" dominant-baseline="central" fill="rgb(55,48,163)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">API Gateway</text>
  <text x="450" y="152" text-anchor="middle" dominant-baseline="central" fill="rgb(79,70,229)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Node.js · Express · port 80</text>
  <!-- routing pills -->
  <rect x="192" y="163" width="150" height="24" rx="6" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="267" y="177" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">/auth/** → :3001</text>
  <rect x="375" y="163" width="150" height="24" rx="6" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="450" y="177" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">/users/** → :3002</text>
  <rect x="558" y="163" width="150" height="24" rx="6" fill="rgb(235,248,242)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="633" y="177" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">/api/** → :8000</text>

  <!-- Arrows: Gateway → services -->
  <line x1="280" y1="202" x2="160" y2="258" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="202" x2="450" y2="258" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="202" x2="740" y2="258" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Auth Service -->
  <rect x="40" y="258" width="200" height="110" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="140" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">Auth Service</text>
  <text x="140" y="298" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Node.js · TS · :3001</text>
  <rect x="56" y="310" width="168" height="22" rx="5" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="140" y="323" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">bcrypt · jwt.sign(HS256)</text>
  <rect x="56" y="338" width="168" height="22" rx="5" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="140" y="351" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">no DB — calls User Svc</text>

  <!-- Arrow: Auth → User (HTTP internal) -->
  <line x1="240" y1="313" x2="330" y2="313" stroke="rgb(115,114,108)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-dashed)"/>
  <text x="285" y="305" text-anchor="middle" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">HTTP (internal)</text>

  <!-- User Service -->
  <rect x="330" y="258" width="240" height="110" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="450" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">User Service</text>
  <text x="450" y="298" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Node.js · TS · :3002</text>
  <rect x="346" y="310" width="208" height="22" rx="5" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="450" y="323" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">CRUD users · publishes user.created</text>
  <rect x="346" y="338" width="208" height="22" rx="5" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="450" y="351" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">consumes users.migration queue</text>

  <!-- Laravel Backend -->
  <rect x="640" y="258" width="210" height="110" rx="10" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="745" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">Laravel Backend</text>
  <text x="745" y="298" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">PHP 8.4 · :8000</text>
  <rect x="656" y="310" width="178" height="22" rx="5" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="745" y="323" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Properties · Contracts</text>
  <rect x="656" y="338" width="178" height="22" rx="5" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="745" y="351" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">VerifyJwt · consumes events</text>

  <!-- User Service → PostgreSQL -->
  <line x1="450" y1="368" x2="450" y2="430" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="456" y="402" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">pg / SQL</text>

  <!-- PostgreSQL -->
  <rect x="340" y="430" width="220" height="52" rx="8" fill="rgb(218,233,252)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="450" y="452" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">PostgreSQL 16</text>
  <text x="450" y="470" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">user_service DB · port 5432</text>

  <!-- Laravel → MySQL -->
  <line x1="745" y1="368" x2="745" y2="430" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="751" y="402" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Eloquent / SQL</text>

  <!-- MySQL -->
  <rect x="630" y="430" width="180" height="52" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="720" y="452" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">MySQL 8</text>
  <text x="720" y="470" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">property_management · :3306</text>

  <!-- phpMyAdmin -->
  <rect x="820" y="430" width="50" height="52" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="845" y="452" text-anchor="middle" dominant-baseline="central" fill="rgb(68,68,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="500">PMA</text>
  <text x="845" y="468" text-anchor="middle" dominant-baseline="central" fill="rgb(95,94,90)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">:8080</text>
  <line x1="820" y1="456" x2="812" y2="456" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RabbitMQ -->
  <rect x="30" y="430" width="200" height="52" rx="8" fill="rgb(255,237,213)" stroke="rgb(154,52,18)" stroke-width="0.5"/>
  <text x="130" y="452" text-anchor="middle" dominant-baseline="central" fill="rgb(124,45,18)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">RabbitMQ</text>
  <text x="130" y="470" text-anchor="middle" dominant-baseline="central" fill="rgb(154,52,18)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">app.events exchange · :5672</text>

  <!-- User Svc → RabbitMQ (publishes) -->
  <line x1="380" y1="368" x2="200" y2="430" stroke="rgb(115,114,108)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-dashed)"/>
  <text x="265" y="390" text-anchor="middle" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">publish user.created</text>

  <!-- RabbitMQ → Laravel (consumes) -->
  <line x1="230" y1="456" x2="630" y2="456" stroke="rgb(115,114,108)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-dashed)"/>
  <text x="430" y="448" text-anchor="middle" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">consume laravel.user-events → sync to MySQL</text>

  <!-- RabbitMQ management label -->
  <text x="130" y="498" text-anchor="middle" fill="rgb(154,52,18)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">management UI :15672</text>
</svg>

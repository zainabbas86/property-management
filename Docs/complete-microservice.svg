<svg width="100%" viewBox="0 0 1000 660" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Property Management — Complete Microservices Target Architecture</title>
  <desc>All services extracted from the monolith. API Gateway routes to Auth, User, Property, and Contract services. Each service owns its own database. RabbitMQ handles cross-service events.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(115,114,108)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- React App -->
  <rect x="420" y="14" width="160" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="500" y="36" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">React App</text>
  <text x="500" y="54" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Vite · port 5173</text>

  <!-- Arrow: React → Gateway -->
  <line x1="500" y1="66" x2="500" y2="108" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="506" y="90" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">all traffic · port 80</text>

  <!-- Docker Compose boundary -->
  <rect x="18" y="100" width="964" height="544" rx="16" fill="none" stroke="rgba(31,30,29,0.15)" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="34" y="95" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Docker Compose network</text>

  <!-- API Gateway -->
  <rect x="150" y="112" width="700" height="90" rx="10" fill="rgb(235,233,255)" stroke="rgb(79,70,229)" stroke-width="1.2"/>
  <text x="500" y="134" text-anchor="middle" dominant-baseline="central" fill="rgb(55,48,163)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">API Gateway</text>
  <text x="500" y="152" text-anchor="middle" dominant-baseline="central" fill="rgb(79,70,229)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Node.js · Express · port 80 · single entry point</text>
  <!-- routing pills -->
  <rect x="162" y="163" width="148" height="24" rx="6" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="236" y="177" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">/auth/** → :3001</text>
  <rect x="326" y="163" width="148" height="24" rx="6" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="400" y="177" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">/users/** → :3002</text>
  <rect x="490" y="163" width="160" height="24" rx="6" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="570" y="177" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">/properties/** → :3003</text>
  <rect x="666" y="163" width="170" height="24" rx="6" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="751" y="177" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">/contracts/** → :3004</text>

  <!-- Arrows: Gateway → 4 services -->
  <line x1="230" y1="202" x2="120" y2="268" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="202" x2="350" y2="268" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="202" x2="610" y2="268" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="202" x2="840" y2="268" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Auth Service -->
  <rect x="30" y="268" width="180" height="100" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="120" y="290" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">Auth Service</text>
  <text x="120" y="308" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Node.js · TS · :3001</text>
  <rect x="44" y="320" width="152" height="20" rx="4" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="120" y="332" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">login · register · me</text>
  <rect x="44" y="344" width="152" height="20" rx="4" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="120" y="356" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">jwt.sign() · no own DB</text>

  <!-- User Service -->
  <rect x="255" y="268" width="200" height="100" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="355" y="290" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">User Service</text>
  <text x="355" y="308" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Node.js · TS · :3002</text>
  <rect x="269" y="320" width="172" height="20" rx="4" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="355" y="332" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">CRUD users</text>
  <rect x="269" y="344" width="172" height="20" rx="4" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="355" y="356" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">publishes user.created</text>

  <!-- Property Service -->
  <rect x="505" y="268" width="200" height="100" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="605" y="290" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">Property Service</text>
  <text x="605" y="308" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Node.js · TS · :3003</text>
  <rect x="519" y="320" width="172" height="20" rx="4" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="605" y="332" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">CRUD properties</text>
  <rect x="519" y="344" width="172" height="20" rx="4" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="605" y="356" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">consumes user.created</text>

  <!-- Contract Service -->
  <rect x="755" y="268" width="200" height="100" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="855" y="290" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">Contract Service</text>
  <text x="855" y="308" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Node.js · TS · :3004</text>
  <rect x="769" y="320" width="172" height="20" rx="4" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="855" y="332" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">CRUD contracts</text>
  <rect x="769" y="344" width="172" height="20" rx="4" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="855" y="356" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">consumes property.created</text>

  <!-- Auth → User (internal HTTP) -->
  <line x1="210" y1="318" x2="255" y2="318" stroke="rgb(115,114,108)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-d)"/>
  <text x="233" y="310" text-anchor="middle" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9">HTTP</text>

  <!-- RabbitMQ -->
  <rect x="330" y="490" width="340" height="52" rx="8" fill="rgb(255,237,213)" stroke="rgb(154,52,18)" stroke-width="0.5"/>
  <text x="500" y="512" text-anchor="middle" dominant-baseline="central" fill="rgb(124,45,18)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">RabbitMQ</text>
  <text x="500" y="530" text-anchor="middle" dominant-baseline="central" fill="rgb(154,52,18)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">app.events topic exchange · :5672 · mgmt :15672</text>

  <!-- User Svc → RabbitMQ -->
  <line x1="355" y1="368" x2="430" y2="490" stroke="rgb(115,114,108)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-d)"/>
  <text x="368" y="430" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">user.created</text>

  <!-- Property Svc → RabbitMQ -->
  <line x1="605" y1="368" x2="560" y2="490" stroke="rgb(115,114,108)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-d)"/>
  <text x="600" y="430" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">property.created</text>

  <!-- RabbitMQ → Property Svc (subscribes user.created) -->
  <line x1="500" y1="490" x2="570" y2="368" stroke="rgb(115,114,108)" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-d)" opacity="0.5"/>

  <!-- RabbitMQ → Contract Svc (subscribes property.created) -->
  <line x1="620" y1="490" x2="780" y2="368" stroke="rgb(115,114,108)" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-d)" opacity="0.5"/>

  <!-- Databases row -->
  <!-- User DB -->
  <rect x="270" y="590" width="170" height="48" rx="8" fill="rgb(218,233,252)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="355" y="610" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">PostgreSQL</text>
  <text x="355" y="628" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">user_service · :5432</text>

  <!-- Property DB -->
  <rect x="455" y="590" width="170" height="48" rx="8" fill="rgb(218,233,252)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="540" y="610" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">PostgreSQL</text>
  <text x="540" y="628" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">property_service · :5433</text>

  <!-- Contract DB -->
  <rect x="640" y="590" width="170" height="48" rx="8" fill="rgb(218,233,252)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="725" y="610" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">PostgreSQL</text>
  <text x="725" y="628" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">contract_service · :5434</text>

  <!-- Service → DB arrows -->
  <line x1="355" y1="368" x2="355" y2="590" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="605" y1="368" x2="540" y2="590" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="855" y1="368" x2="725" y2="590" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <line x1="34" y1="530" x2="64" y2="530" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="70" y="534" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">synchronous (HTTP)</text>
  <line x1="34" y1="554" x2="64" y2="554" stroke="rgb(115,114,108)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-d)"/>
  <text x="70" y="558" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">async (event / queue)</text>
</svg>

<svg width="100%" viewBox="0 0 760 510" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Property Management — API Gateway Architecture</title>
  <desc>All browser traffic enters through the API Gateway on port 80. The gateway routes /auth/* requests to the Node.js Auth Service and /api/* requests to the Laravel Backend. Both services connect to a shared MySQL database.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── React App (outside Docker) ── -->
  <rect x="300" y="18" width="160" height="52" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="380" y="40" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">React App</text>
  <text x="380" y="58" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Vite · port 5173</text>

  <!-- Arrow: Browser → Gateway -->
  <line x1="380" y1="70" x2="380" y2="118" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="386" y="97" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">all traffic · port 80</text>

  <!-- ── Docker Compose boundary ── -->
  <rect x="20" y="108" width="720" height="386" rx="16" fill="none" stroke="rgba(31,30,29,0.15)" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="36" y="102" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Docker Compose network</text>

  <!-- ── API Gateway ── -->
  <rect x="155" y="118" width="450" height="98" rx="10" fill="rgb(235,233,255)" stroke="rgb(79,70,229)" stroke-width="1.2"/>
  <text x="380" y="138" text-anchor="middle" dominant-baseline="central" fill="rgb(55,48,163)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">API Gateway</text>
  <text x="380" y="156" text-anchor="middle" dominant-baseline="central" fill="rgb(79,70,229)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Node.js · Express · port 80 · single entry point</text>

  <!-- Routing rule pills inside gateway -->
  <rect x="168" y="166" width="188" height="26" rx="6" fill="rgb(245,243,255)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="262" y="181" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">/auth/**  →  Auth Svc :3001</text>

  <rect x="404" y="166" width="188" height="26" rx="6" fill="rgb(235,248,242)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="498" y="181" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">/api/**  →  Backend :8000</text>

  <!-- ── Arrows: Gateway → Services ── -->
  <line x1="245" y1="216" x2="158" y2="268" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="176" y="238" text-anchor="middle" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">/auth/**</text>

  <line x1="515" y1="216" x2="602" y2="268" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="576" y="238" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">/api/**</text>

  <!-- ── Auth Service ── -->
  <rect x="40" y="268" width="200" height="122" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="140" y="292" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">Auth Service</text>
  <text x="140" y="310" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Node.js · TypeScript · :3001</text>
  <rect x="58" y="322" width="164" height="22" rx="5" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="140" y="335" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">bcrypt · jwt.sign()</text>
  <rect x="58" y="350" width="164" height="22" rx="5" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="140" y="363" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">login · register · me</text>

  <!-- ── Laravel Backend ── -->
  <rect x="520" y="268" width="200" height="122" rx="10" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="620" y="292" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">Laravel Backend</text>
  <text x="620" y="310" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">PHP 8.4 · :8000</text>
  <rect x="538" y="322" width="164" height="22" rx="5" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="620" y="335" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">VerifyJwt middleware</text>
  <rect x="538" y="350" width="164" height="22" rx="5" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="620" y="363" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Properties · Contracts</text>

  <!-- ── Arrows: Services → MySQL ── -->
  <line x1="140" y1="390" x2="295" y2="430" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="178" y="406" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">SELECT users</text>
  <text x="184" y="419" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">(login only)</text>

  <line x1="600" y1="390" x2="455" y2="430" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="543" y="408" text-anchor="middle" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Eloquent / SQL</text>

  <!-- ── MySQL ── -->
  <rect x="255" y="430" width="200" height="52" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="355" y="452" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">MySQL 8</text>
  <text x="355" y="470" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">port 3306</text>

  <!-- ── phpMyAdmin ── -->
  <rect x="510" y="430" width="172" height="52" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="596" y="452" text-anchor="middle" dominant-baseline="central" fill="rgb(68,68,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500">phpMyAdmin</text>
  <text x="596" y="470" text-anchor="middle" dominant-baseline="central" fill="rgb(95,94,90)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">port 8080</text>

  <!-- phpMyAdmin → MySQL -->
  <line x1="510" y1="456" x2="455" y2="456" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="482" y="448" text-anchor="middle" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">DB admin UI</text>
</svg>

<svg width="100%" viewBox="0 0 740 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Auth Architecture: Before (Sanctum) vs After (JWT Service)</title>
  <desc>Before: Laravel Sanctum stores opaque tokens in MySQL and performs a database lookup on every API request. After: a standalone Node.js Auth Service issues signed JWTs that Laravel verifies in-memory — no database round-trip per request.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(180,50,20)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(15,110,86)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Panel backgrounds -->
  <rect x="0"   y="0" width="364" height="400" fill="rgba(250,235,215,0.4)"/>
  <rect x="376" y="0" width="364" height="400" fill="rgba(220,245,232,0.4)"/>

  <!-- Divider -->
  <line x1="370" y1="12" x2="370" y2="388" stroke="rgba(31,30,29,0.18)" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ── LEFT PANEL ── -->

  <text x="182" y="22" text-anchor="middle" fill="rgb(120,55,10)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600">Before — Sanctum (monolith)</text>

  <!-- Browser (left) -->
  <rect x="112" y="34" width="140" height="50" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="182" y="55" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">Browser / React</text>
  <text x="182" y="73" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Bearer opaque-token</text>

  <!-- Arrow: Browser → Laravel (left) -->
  <line x1="182" y1="84" x2="182" y2="128" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="188" y="109" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">every request</text>

  <!-- Laravel Monolith (left) -->
  <rect x="82" y="128" width="200" height="108" rx="10" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="182" y="152" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">Laravel Monolith</text>
  <text x="182" y="170" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Auth · Properties · Contracts</text>
  <rect x="102" y="182" width="160" height="20" rx="5" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="182" y="195" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">auth:sanctum middleware</text>
  <rect x="102" y="208" width="160" height="20" rx="5" fill="rgb(255,243,235)" stroke="rgb(180,50,20)" stroke-width="0.5"/>
  <text x="182" y="221" text-anchor="middle" dominant-baseline="central" fill="rgb(150,40,10)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">SELECT personal_access_tokens</text>

  <!-- Arrow: Laravel → MySQL (left) — red to highlight the problem -->
  <line x1="182" y1="236" x2="182" y2="288" stroke="rgb(180,50,20)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="188" y="259" fill="rgb(180,50,20)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600">DB hit on every request</text>

  <!-- MySQL (left) -->
  <rect x="112" y="288" width="140" height="50" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="182" y="309" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">MySQL</text>
  <text x="182" y="327" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">users · personal_access_tokens</text>

  <!-- Bottom note (left) -->
  <rect x="22" y="355" width="320" height="30" rx="6" fill="rgb(255,243,235)" stroke="rgb(180,50,20)" stroke-width="0.5"/>
  <text x="182" y="373" text-anchor="middle" dominant-baseline="central" fill="rgb(150,40,10)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Token table grows; revocation needs a DB write</text>

  <!-- ── RIGHT PANEL ── -->

  <text x="558" y="22" text-anchor="middle" fill="rgb(8,80,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600">After — JWT Auth Service</text>

  <!-- Browser (right) -->
  <rect x="488" y="34" width="140" height="50" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)" stroke-width="0.5"/>
  <text x="558" y="55" text-anchor="middle" dominant-baseline="central" fill="rgb(12,68,124)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">Browser / React</text>
  <text x="558" y="73" text-anchor="middle" dominant-baseline="central" fill="rgb(24,95,165)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Bearer JWT (signed · 7 days)</text>

  <!-- Arrow: Browser → Auth Service (diagonal left) -->
  <line x1="520" y1="84" x2="452" y2="128" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="462" y="104" text-anchor="middle" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">login / register</text>

  <!-- Arrow: Browser → Laravel (diagonal right) -->
  <line x1="596" y1="84" x2="637" y2="128" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="638" y="104" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">API calls + JWT</text>

  <!-- Auth Service box -->
  <rect x="386" y="128" width="132" height="108" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="452" y="152" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">Auth Service</text>
  <text x="452" y="170" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Node.js · :3001</text>
  <rect x="400" y="182" width="104" height="20" rx="5" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="452" y="195" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">bcrypt · jwt.sign()</text>
  <rect x="400" y="208" width="104" height="20" rx="5" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="452" y="221" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">issues JWT on login</text>

  <!-- Laravel box (right) -->
  <rect x="530" y="128" width="132" height="108" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="596" y="152" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">Laravel Backend</text>
  <text x="596" y="170" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Properties · Contracts</text>
  <rect x="544" y="182" width="104" height="20" rx="5" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="596" y="195" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">VerifyJwt middleware</text>
  <rect x="544" y="208" width="104" height="20" rx="5" fill="rgb(230,250,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="596" y="221" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600">verify in-memory</text>

  <!-- Arrow: Auth Service → MySQL (right) — thin, login only -->
  <line x1="452" y1="236" x2="510" y2="286" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="459" y="265" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">SELECT users</text>
  <text x="459" y="278" fill="rgb(61,61,58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">(login only)</text>

  <!-- No-DB-hit indicator beside Laravel -->
  <line x1="596" y1="236" x2="596" y2="260" stroke="rgb(15,110,86)" stroke-width="1.5" stroke-dasharray="3 3"/>
  <rect x="550" y="260" width="100" height="20" rx="5" fill="rgb(230,250,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="600" y="273" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600">no DB hit</text>

  <!-- MySQL (right) -->
  <rect x="488" y="288" width="140" height="50" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="558" y="309" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">MySQL (shared)</text>
  <text x="558" y="327" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">users table only</text>

  <!-- Bottom note (right) -->
  <rect x="398" y="355" width="320" height="30" rx="6" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="558" y="373" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">Stateless · no shared session · horizontally scalable</text>
</svg>

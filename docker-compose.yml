services:
  backend:
    build: ./laravel-backend
    ports:
      - "8000:8000"
    volumes:
      - ./laravel-backend:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: property_management
      DB_USERNAME: laravel
      DB_PASSWORD: secret
    depends_on:
      - db

  frontend:
    build: ./property-management-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./property-management-frontend:/app
    environment:
      VITE_API_URL: http://localhost:8000

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: property_management
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data:

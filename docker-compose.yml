services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI → http://localhost:15672  guest/guest
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: userservice
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: property_management
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql

  # ── Services ────────────────────────────────────────────────────────────────

  user-service:
    build: ./user-service
    ports:
      - "3002:3002"
    volumes:
      - ./user-service:/app
      - user_node_modules:/app/node_modules
    environment:
      PORT: 3002
      POSTGRES_URL: postgres://userservice:secret@postgres:5432/user_service
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - postgres
      - rabbitmq

  auth-service:
    build: ./auth-service
    ports:
      - "3001:3001"
    volumes:
      - ./auth-service:/app
      - auth_node_modules:/app/node_modules
    environment:
      PORT: 3001
      JWT_SECRET: super_secret_jwt_key_change_in_production
      USER_SERVICE_URL: http://user-service:3002
    depends_on:
      - user-service

  backend:
    build: ./laravel-backend
    ports:
      - "8000:8000"
    volumes:
      - ./laravel-backend:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: property_management
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      JWT_SECRET: super_secret_jwt_key_change_in_production
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      - db
      - rabbitmq

  api-gateway:
    build: ./api-gateway
    ports:
      - "80:80"
    volumes:
      - ./api-gateway:/app
      - gateway_node_modules:/app/node_modules
    environment:
      PORT: 80
    depends_on:
      - auth-service
      - user-service
      - backend

  frontend:
    build: ./property-management-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./property-management-frontend:/app
    environment:
      VITE_GATEWAY_URL: http://localhost

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data:
  postgres_data:
  rabbitmq_data:
  auth_node_modules:
  user_node_modules:
  gateway_node_modules:

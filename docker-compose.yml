services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "80:80"
    volumes:
      - ./api-gateway:/app
      - gateway_node_modules:/app/node_modules
    environment:
      PORT: 80
    depends_on:
      - auth-service
      - backend

  auth-service:
    build: ./auth-service
    ports:
      - "3001:3001"
    volumes:
      - ./auth-service:/app
      - auth_node_modules:/app/node_modules
    environment:
      DB_HOST: db
      DB_DATABASE: property_management
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      JWT_SECRET: super_secret_jwt_key_change_in_production
      PORT: 3001
    depends_on:
      - db

  backend:
    build: ./laravel-backend
    ports:
      - "8000:8000"
    volumes:
      - ./laravel-backend:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: property_management
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      JWT_SECRET: super_secret_jwt_key_change_in_production
    depends_on:
      - db

  frontend:
    build: ./property-management-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./property-management-frontend:/app
    environment:
      VITE_GATEWAY_URL: http://localhost

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: property_management
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data:
  auth_node_modules:
  gateway_node_modules:
